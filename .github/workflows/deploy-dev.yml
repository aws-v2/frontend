name: CI - Test and PR to Staging

on:
  push:
    branches: [ "dev" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 1. Type-check (fast fail if TS is broken)
      - name: Type check
        run: npm run type-check

      # ── 2. Run unit + API + E2E (Vitest)
      - name: Run tests
        run: npm run test

      # Optional: separate coverage (recommended)
      - name: Run tests with coverage
        run: npm run test:coverage

      # ── 3. Build (only if everything passed)
      - name: Build app
        run: npm run build

  open-pr-to-staging:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR dev → staging.
        run: |
          if gh pr list --base staging --head dev --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "chore: promote dev → staging" \
              --body "✅ All CI checks passed on dev. Auto-generated PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}