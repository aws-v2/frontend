name: CI - Test and CI to Staging

on:
  push:
    branches: [ "dev" ]

jobs:
  test-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks (Build and Type-check)
        run: npm run build

      - name: Create Pull Request to Staging
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated PR from dev to staging"
          title: "Automated PR: dev -> staging"
          body: "This is an automated pull request created after successful CI checks on the dev branch."
          branch: dev
          base: staging
