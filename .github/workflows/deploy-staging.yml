name: CD - Build and Push Docker Image

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push.
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/frontend-server:staging
        build-args: |
          SPRING_PROFILES_ACTIVE=staging

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Install Tailscale
      run: |
        curl -fsSL https://tailscale.com/install.sh | sh
        sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Deploy to Staging via SSH over Tailscale.
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          docker pull qarani/frontend-server:staging
          docker stop frontend-server || true
          docker rm frontend-server || true
          docker run -d --name frontend-server --network aws-staging-network -e VITE_API_BASE_URL=http://localhost:8080 -e VITE_APP_PROFILE=staging -p 5173:80 qarani/frontend-server:staging