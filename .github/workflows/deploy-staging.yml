name: CD - Build, Deploy and PR to Main

on:
  pull_request:
    branches: [staging]

  push:
    branches: [staging]

jobs:

  # =========================
  # 1. PR GATE (NO DEPLOY)
  # =========================
  api:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run test:api


  e2e:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run test:e2e


  # =========================
  # 2. BUILD + DEPLOY (ONLY AFTER MERGE)
  # =========================
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [api, e2e]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/frontend-server:staging
          build-args: |
            VITE_APP_PROFILE=staging


  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull qarani/frontend-server:staging
            docker stop frontend-server || true
            docker rm frontend-server || true
            docker run -d \
              --name frontend-server \
              --network aws-staging-network \
              -e VITE_API_BASE_URL=http://localhost:8080 \
              -e VITE_APP_PROFILE=staging \
              -e API_GATEWAY_HOST=api-gateway-staging \
              -p 5173:80 \
              qarani/frontend-server:staging


  open-pr-to-main:
    if: github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR staging → main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch origin staging main

          if [ -z "$(git log origin/main..origin/staging --oneline)" ]; then
            echo "No commits between staging and main. Skipping PR..."
            exit 0
          fi

          if gh pr list --base main --head staging --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "chore: promote staging → main" \
              --body "✅ Staging deployment succeeded. Auto-generated PR for production release."
          fi